        )
        
        # 下载插件：改用 curl_cffi + safari15_5 TLS指纹伪装（沿用 sync_loon_unified.py 里
        # 已验证对 kelee.one / git.repcz.link 这类反爬防护有效的下载方式，比裸curl更不容易
        # 被限流/拒绝服务，这也是之前卡死的根本原因之一）。
        # 同时加了超时(15秒/个)和8路并发，把原本174次串行裸curl的耗时大幅压缩，
        # 单个插件失败只跳过记录，不影响其余插件继续下载。

        # 装 curl_cffi
        pip install curl_cffi --break-system-packages -q

        # 把 bash 关联数组导出成 "插件名\tURL" 格式的临时文件，供 Python 脚本读取
        > /tmp/plugin_list.tsv
        for plugin_name in "${!plugins[@]}"; do
            printf "%s\t%s\n" "$plugin_name" "${plugins[$plugin_name]}" >> /tmp/plugin_list.tsv
        done

        python3 rules-repo/scripts/download_plugins.py < /tmp/plugin_list.tsv

        # 删除 error.log 文件
        # rm -f rules-repo/Loon/Plugin/Kelee/error.log || echo "No error log to delete"


    - name: 提取链接
      run: |
        # 确保目标目录存在
        mkdir -p Script
    
        # 切换到 Kelee 目录
        cd rules-repo/Loon/Plugin/Kelee
    
        # 遍历 .plugin 文件并提取 .js 链接
        for file in *.plugin; do
          if [ -f "$file" ]; then
            # 提取链接
            grep -o 'https://kelee\.one/Resource/JavaScript/[^ ]*\.js' "$file" | while read -r script_url; do
              script_name=$(basename "$script_url")
    
              # 确保下载目录存在
              if [ ! -d "Script" ]; then
                echo "目标目录不存在，创建目录..."
                mkdir -p Script
              fi

              # 使用 curl 下载脚本
              curl --connect-timeout 10 --max-time 30 -A "Surge iOS/3367" -L -o "Script/$script_name" "$script_url" || echo "Failed to download $script_url" >> error.log
            done
          fi
        done

    - name: 编辑LOON模块
      run: |
        mkdir -p rules-repo/Loon/Plugin/Kelee
        cd rules-repo/Loon/Plugin/Kelee  # 进入 Plugin 目录
        for file in *.plugin; do
          if [ "$file" ] ; then

            # 修改以 .js 结尾的脚本链接，删除一个文件夹部分
            sed -i 's|https://kelee\.one/Resource/JavaScript/.*/\([^/]*\.js\)|https://github.com/wot1026/rules/raw/X/Loon/Plugin/Kelee/Script/\1|' "$file"

            # 修改 #!homepage 行（处理等号前可能有空格的情况）
            sed -i 's|#!homepage\s*=\s*.*|#!homepage=https://github.com/wot1026/rules/raw/X/Loon/Plugin/Kelee/'"$file"'|g' "$file"

            # 直接修改 #!openUrl 或 #!openurl 为 #App链接
            sed -i 's|^#!open[uU]rl\s*=\s*\(.*\)|#App链接=\1|' "$file"

            # 判断是否有 []，如果有就替换最后一个 []，否则直接添加
            sed -i '/^#!author/{
            # 如果没有 []，在末尾添加新的链接
            /^[^[]*$/ s|\(#!author\s*=\s*[^,]*\)$|\1[https://github.com/wot1026/rules/blob/X/Loon/Readme.md]|
            # 如果有 []，替换最后一个 [] 内容
            s|\(#!author\s*=\s*.*\)\[\([^]]*\)\]|\1[https://github.com/wot1026/rules/blob/X/Loon/Readme.md]|
            # 如果有多个作者，只替换最后一个作者的 [] 或者加到末尾
            s|\(#!author\s*=\s*.*\),\([^,]*\)\[\([^]]*\)\]|\1,\2[https://github.com/wot1026/rules/blob/X/Loon/Readme.md]|
            }' "$file"

          fi
        done

    - name: 单独复刻loon配置
      run: |
        mkdir -p rules-repo/Loon
        curl --connect-timeout 10 --max-time 30 -L -o rules-repo/Loon/Loon.conf "https://github.com/Moli-X/Resources/raw/main/Loon/Loon.conf"


###### Clash

    - name: Clash规则
      run: |
        rm -rf rules-repo/Ruleset
        for file in rules-repo/Clash/Rules/*.list; do
          if [ -f "$file" ]; then
            sed -i -e '/^USER-AGENT/d' "$file"
            sed -i -e '/^URL-REGEX/d' "$file"
            file_names=$(basename "$file" .list)
            line_count=$(wc -l < "$file")
            awk -v fname="$file_names" 'NR==1 {print "# 规则名称: " fname} {print}' "$file" > tmpfile && mv tmpfile "$file"
            awk -v count="$line_count" 'NR==2 {print "# 规则统计: " count} {print}' "$file" > tmpfile && mv tmpfile "$file"
            sed -i '2a\\' "$file"
          else
            echo "$file not found."
          fi
        done

    - name: 复刻Meta覆写
      run: |
        mkdir -p rules-repo/Clash/Meta

        curl --connect-timeout 10 --max-time 30 -L -o rules-repo/Clash/Meta/Override.js "https://github.com/Repcz/Tool/raw/X/Clash/Meta/Override.js"
        curl --connect-timeout 10 --max-time 30 -L -o rules-repo/Clash/Meta/MihomoParty.js "https://github.com/Moli-X/Resources/raw/main/Clash/Script/MihomoParty.js"
        curl --connect-timeout 10 --max-time 30 -L -o rules-repo/Clash/Meta/MihomoParty.yaml "https://github.com/Moli-X/Resources/raw/main/Clash/MihomoParty.yaml"

###### QuantumultX

    - name: QuantumultX规则
      run: |
        # 转换逻辑改为调用 scripts/convert_quantumultx.py（原本这里是一堆 sed/awk 叠加实现，
        # 有三个问题：1) ", no-resolve"（逗号后带空格）清不掉，导致后续 awk 追加 policy 时
        # no-resolve 和 policy 位置错位；2) 完全没有处理行内 // 注释，注释文字会混入字段，
        # 导致规则解析错位甚至失效（已在 Reject.list / ChinaASN.list 等生产文件里实测复现）；
        # 3) 多个独立 sed/awk 顺序执行，互不感知，纯文本层面拼接。
        # 新脚本一次性正确处理这三点，见 scripts/convert_quantumultx.py 顶部说明。
        python3 rules-repo/scripts/convert_quantumultx.py rules-repo/QuantumultX/Rules


