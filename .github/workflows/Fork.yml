name: Fork & Edit

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0,12 * * *"

permissions:
  actions: write  
  contents: write  



jobs:
  ForkRepository:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Shanghai'
    
    steps: 
    - name: 验证目标存储库
      uses: actions/checkout@v4.2.2
      with:
        repository: wot1026/rules
        path: rules-repo
        token: ${{ secrets.GITHUB_TOKEN }}  


    
###### Fork

    - name: 复刻原始文件
      run: |
        mkdir -p rules-repo/.github/Record
        curl --connect-timeout 10 --max-time 30 -L -o rules-repo/.github/Record/Build.yml "https://github.com/Repcz/Tool/raw/X/.github/workflows/Build.yml"
        curl --connect-timeout 10 --max-time 30 -L -o rules-repo/.github/Record/ClearCommits.yml "https://github.com/Repcz/Tool/raw/X/.github/workflows/ClearCommits.yml"

    - name: 规则下载
