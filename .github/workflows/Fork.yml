            echo "$file not found."
          fi
        done

    - name: 单独复刻Shadowrocket配置
      run: |
        mkdir -p rules-repo/Shadowrocket
        curl --connect-timeout 10 --max-time 30 -L -o rules-repo/Shadowrocket/Shadowrocket.conf "https://raw.githubusercontent.com/Moli-X/Shadowrocket/Master/Rewite/Shadowrocket.conf"



###### Stash

    - name: Stash规则
      run: |
        for file in rules-repo/Stash/Rules/*.list; do
          if [ -f "$file" ]; then
            sed -i -e '/^USER-AGENT/d' "$file"
            sed -i -e '/^URL-REGEX/d' "$file"
            sed -i -e '/^AND/d' "$file"
            sed -i -e '/^OR/d' "$file"
            sed -i -e '/^NOT/d' "$file"
            file_names=$(basename "$file" .list)
            line_count=$(wc -l < "$file")
            awk -v fname="$file_names" 'NR==1 {print "# 规则名称: " fname} {print}' "$file" > tmpfile && mv tmpfile "$file"
            awk -v count="$line_count" 'NR==2 {print "# 规则统计: " count} {print}' "$file" > tmpfile && mv tmpfile "$file"
            sed -i -E '/^(OR|AND|NOT|USER-AGENT|URL-REGEX),/ s/^/#/' "$file"
            sed -i '2a\\' "$file"
          else
            echo "$file not found."
          fi
        done

##### Egern       
    - name: Egern规则
      run: |
        # 确保目标目录存在
        mkdir -p rules-repo/Egern/Rules

        # 转换逻辑改为调用 scripts/convert_egern.py（原本这里是一堆 sed/awk 叠加实现，
        # 有三个问题：1) USER-AGENT 行被直接删除而不是转换成 user_agent_set；
        # 2) no-resolve 判定后插入的字段名因sed转义问题写成了 "o_resolve: true"（丢了开头的n）；
        # 3) 完全没有处理注释行(#开头)，源文件里夹带的说明性注释会原样混入。
        # 新脚本一次性正确处理这三点，见 scripts/convert_egern.py 顶部说明。
        python3 rules-repo/scripts/convert_egern.py rules-repo/Egern/Rules



