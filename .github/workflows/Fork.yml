    - name: Copy文件
      run: |
        rm -rf rules-repo/{Clash,Egern,Loon,QuantumultX,Shadowrocket,Stash,Surge}/Rules
        mkdir -p rules-repo/{Clash,Egern,Loon,QuantumultX,Shadowrocket,Stash,Surge}/Rules
        for file in rules-repo/Ruleset/*.list; do
          filename=$(basename "$file")
          for dir in Clash Loon QuantumultX Shadowrocket Stash Surge; do
            cp "$file" "rules-repo/$dir/Rules/$filename"
          done
          # 复制到Egern文件夹, 并将后缀改为.yaml
          cp "$file" "rules-repo/Egern/Rules/${filename%.*}.yaml"
        done
        echo "Files copied successfully."

###### Loon
    - name: Loon
      run: |
        for file in rules-repo/Loon/Rules/*.list; do
          if [ -f "$file" ]; then
            sed -i -e '/^PROCESS-NAME/d' "$file"
            file_names=$(basename "$file" .list)
            line_count=$(wc -l < "$file")
            awk -v fname="$file_names" 'NR==1 {print "# 规则名称: " fname} {print}' "$file" > tmpfile && mv tmpfile "$file"
            awk -v count="$line_count" 'NR==2 {print "# 规则统计: " count} {print}' "$file" > tmpfile && mv tmpfile "$file"
            sed -i '2a\\' "$file"
          else
            echo "$file not found."
          fi
        done


