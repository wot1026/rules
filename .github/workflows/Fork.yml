        curl --connect-timeout 10 --max-time 120 -L -o rules-repo/GeoIP/geosite.dat "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
        curl --connect-timeout 10 --max-time 120 -L -o rules-repo/GeoIP/country-lite.mmdb "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
        curl --connect-timeout 10 --max-time 120 -L -o rules-repo/GeoIP/GeoLite2-ASN.mmdb "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"




